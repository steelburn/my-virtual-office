<style>
:root {
  --bg: #0a0a1a; --surface: #141428; --surface2: #1c1c3a;
  --border: #2a2a5a; --text: #e0e0ff; --dim: #8888bb;
  --accent: #ffd700; --green: #44ff88; --red: #ff4466;
  --blue: #4488ff; --orange: #ffaa33;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.header { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.header h1 { font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--accent); white-space: nowrap; }
.header .back { font-size: 13px; white-space: nowrap; }
.header .status { margin-left: auto; font-size: 12px; padding: 4px 10px; border-radius: 12px; white-space: nowrap; }
.header .status.online { background: #1a3a2a; color: var(--green); }
.header .status.offline { background: #3a1a1a; color: var(--red); }
.header .status.connecting { background: #3a3a1a; color: var(--orange); }

.toolbar { background: var(--surface); padding: 10px 16px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.toolbar button { background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; white-space: nowrap; }
.toolbar button:hover { opacity: 0.85; }
.toolbar .filter { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.toolbar select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; font-size: 13px; max-width: 200px; }

.jobs { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
.job-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; transition: border-color 0.2s; overflow: hidden; }
.job-card:hover { border-color: var(--accent); }
.job-card.disabled { opacity: 0.5; }
.job-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.job-name { font-weight: 700; font-size: 15px; color: var(--accent); min-width: 0; word-break: break-word; }
.job-agent { background: var(--surface2); padding: 3px 10px; border-radius: 12px; font-size: 12px; color: var(--blue); white-space: nowrap; }
.job-schedule { font-size: 13px; color: var(--dim); font-family: monospace; white-space: nowrap; }
.job-status { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.job-status .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge.ok { background: #1a3a2a; color: var(--green); }
.badge.error { background: #3a1a1a; color: var(--red); }
.badge.disabled { background: #2a2a3a; color: var(--dim); }
.badge.pending { background: #3a3a1a; color: var(--orange); }
.job-meta { display: flex; gap: 12px; margin-top: 8px; font-size: 12px; color: var(--dim); flex-wrap: wrap; }
.job-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.job-actions button { padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 12px; white-space: nowrap; }
.job-actions button:hover { border-color: var(--accent); color: var(--accent); }
.job-actions button.run { border-color: var(--green); color: var(--green); }
.job-actions button.run:hover { background: #1a3a2a; }
.job-actions button.delete { border-color: var(--red); color: var(--red); }
.job-actions button.delete:hover { background: #3a1a1a; }
.job-actions button.toggle { border-color: var(--orange); color: var(--orange); }

/* Mobile responsive */
@media (max-width: 600px) {
  .header { padding: 10px 12px; gap: 8px; }
  .header h1 { font-size: 11px; }
  .toolbar { padding: 8px 12px; gap: 6px; }
  .toolbar .filter { margin-left: 0; width: 100%; }
  .toolbar select { flex: 1; min-width: 0; max-width: none; }
  .jobs { padding: 8px 10px; gap: 10px; }
  .job-card { padding: 10px; }
  .job-name { min-width: 0; font-size: 14px; }
  .job-row { gap: 6px; }
  .job-meta { gap: 8px; font-size: 11px; }
  .job-meta span { word-break: break-all; }
  .job-actions { gap: 4px; }
  .job-actions button { padding: 5px 8px; font-size: 11px; }
  .modal { padding: 16px; }
  .modal h2 { font-size: 10px; }
  .form-row { flex-direction: column; gap: 0; }
}

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: flex-start; padding-top: 60px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 2px solid var(--accent); border-radius: 12px; width: 600px; max-width: 95vw; max-height: 80vh; overflow-y: auto; padding: 24px; }
.modal h2 { font-family: 'Press Start 2P', monospace; font-size: 12px; color: var(--accent); margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  padding: 8px 12px; border-radius: 6px; font-size: 14px; font-family: inherit;
}
.form-group textarea { min-height: 80px; resize: vertical; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); outline: none; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.form-hint { font-size: 11px; color: var(--dim); margin-top: 2px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.modal-actions button { padding: 8px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; border: none; }
.modal-actions .save { background: var(--accent); color: #000; }
.modal-actions .cancel { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.modal-actions .save:hover { opacity: 0.85; }
.modal-actions .cancel:hover { border-color: var(--accent); }
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 2000; animation: fadeIn 0.3s; }
.toast.success { background: #1a3a2a; color: var(--green); border: 1px solid var(--green); }
.toast.error { background: #3a1a1a; color: var(--red); border: 1px solid var(--red); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.empty { text-align: center; padding: 60px; color: var(--dim); font-size: 14px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--dim); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

<script>
let GATEWAY_TOKEN = '';
let GATEWAY_PROTOCOL_VERSION = 4;
let AGENTS = [];
let _cronWsPort = 0; // 0 = not yet loaded

// Load gateway token, WS port, and agents dynamically
(async function() {
  try {
    const infoRes = await fetch('/gateway-info');
    const info = await infoRes.json();
    if (info.token) GATEWAY_TOKEN = info.token;
    if (info.wsPort) _cronWsPort = info.wsPort;
    if (info.gatewayProtocol) GATEWAY_PROTOCOL_VERSION = Number(info.gatewayProtocol) || 4;
  } catch(e) {
    console.warn('Failed to fetch /gateway-info:', e);
  }
  try {
    const agentsRes = await fetch('/api/agents');
    const data = await agentsRes.json();
    AGENTS = (data.agents || []).map(function(a) {
      return { id: a.id, label: (a.emoji || '🤖') + ' ' + a.name + (a.role ? ' (' + a.role + ')' : '') };
    });
  } catch(e) {
    AGENTS = [{ id: 'main', label: '🤖 Main Agent' }];
  }
  // Rebuild agent selects then connect
  populateAgentSelects();
  connectGateway();
})();

let ws = null, reqId = 0, connected = false, pendingCB = {};
let allJobs = [];
let editingJobId = null;

// --- WS Connection ---
function getWsUrl() {
  const host = window.location.hostname || '127.0.0.1';
  // If accessed via HTTPS, use wss through the reverse-proxy path (same origin)
  if (window.location.protocol === 'https:') {
    const port = window.location.port ? ':' + window.location.port : '';
    return `wss://${host}${port}/ws-gateway`;
  }
  // Use the WS proxy port from /gateway-info (falls back to same-origin port + 1)
  const port = _cronWsPort || (parseInt(window.location.port || '8090') + 1);
  return `ws://${host}:${port}`;
}
function nextId() { return `cron-${++reqId}-${Date.now()}`; }

let _wsRetryCount = 0;
function connectGateway() {
  const statusEl = document.getElementById('ws-status');
  statusEl.textContent = 'Connecting...';
  statusEl.className = 'status connecting';
  const url = getWsUrl();
  try {
    ws = new WebSocket(url);
  } catch(e) {
    statusEl.textContent = 'WS Error';
    statusEl.className = 'status offline';
    console.error('WebSocket create failed:', e);
    return;
  }
  // Timeout: if no challenge received within 8s, something is wrong
  const connectTimeout = setTimeout(() => {
    if (!connected && ws) {
      console.warn('WS connect timeout — no challenge received');
      ws.close();
    }
  }, 8000);
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'event' && msg.event === 'connect.challenge') { clearTimeout(connectTimeout); sendConnect(); return; }
    if (msg.type === 'res' && pendingCB[msg.id]) { pendingCB[msg.id](msg); delete pendingCB[msg.id]; }
    // cron.run returns event instead of res — treat cron events as success for pending run calls
    if (msg.type === 'event' && msg.event === 'cron' && msg.payload?.action === 'started') {
      Object.keys(pendingCB).forEach(k => { if (k.startsWith('cron-')) { pendingCB[k]({ok:true, payload:msg.payload}); delete pendingCB[k]; } });
    }
  };
  ws.onclose = () => {
    clearTimeout(connectTimeout);
    connected = false; ws = null;
    _wsRetryCount++;
    const isHttps = window.location.protocol === 'https:';
    if (_wsRetryCount > 3 && isHttps) {
      statusEl.textContent = 'WSS Failed — check cert';
      statusEl.className = 'status offline';
      statusEl.title = 'WebSocket over HTTPS failed. Your browser may not trust the TLS certificate. Try accessing via HTTP instead, or accept the certificate.';
    } else {
      statusEl.textContent = 'Disconnected';
      statusEl.className = 'status offline';
    }
    const delay = Math.min(3000 * Math.pow(1.5, _wsRetryCount - 1), 30000);
    setTimeout(connectGateway, delay);
  };
  ws.onerror = (e) => {
    console.error('WebSocket error:', e);
    statusEl.textContent = 'Error';
    statusEl.className = 'status offline';
  };
}

function sendConnect() {
  const id = nextId();
  ws.send(JSON.stringify({
    type:'req', id, method:'connect',
    params: {
      minProtocol:GATEWAY_PROTOCOL_VERSION, maxProtocol:GATEWAY_PROTOCOL_VERSION,
      client:{id:'openclaw-control-ui',version:'2026.5.27',platform:'web',mode:'webchat'},
      role:'operator', scopes:['operator.read','operator.write','operator.admin'],
      caps:[], commands:[], permissions:{},
      auth:{token:GATEWAY_TOKEN}, locale:'en-US', userAgent:'cron-manager/1.0'
    }
  }));
  pendingCB[id] = (res) => {
    if (res.ok) {
      connected = true;
      _wsRetryCount = 0;
      const el = document.getElementById('ws-status');
      el.textContent = 'Connected'; el.className = 'status online';
      loadJobs();
    } else {
      const el = document.getElementById('ws-status');
      el.textContent = 'Auth Failed'; el.className = 'status offline';
      console.error('Gateway auth failed:', res.error);
    }
  };
}

function rpc(method, params) {
  return new Promise((resolve, reject) => {
    if (!connected || !ws) { reject(new Error('Not connected')); return; }
    const id = nextId();
    ws.send(JSON.stringify({type:'req', id, method, params}));
    const timeout = setTimeout(() => { delete pendingCB[id]; reject(new Error('Timeout')); }, 30000);
    pendingCB[id] = (res) => { clearTimeout(timeout); resolve(res); };
  });
}

// --- Init agent dropdowns ---
function initAgentDropdowns() {
  populateAgentSelects();
}

function populateAgentSelects() {
  const filterSel = document.getElementById('filter-agent');
  const formSel = document.getElementById('f-agent');
  const delAcctSel = document.getElementById('f-del-account');
  // Clear existing options (keep first "All"/"Default" option)
  while (filterSel.options.length > 1) filterSel.remove(1);
  while (formSel.options.length > 0) formSel.remove(0);
  if (delAcctSel) while (delAcctSel.options.length > 1) delAcctSel.remove(1);
  AGENTS.forEach(a => {
    filterSel.add(new Option(a.label, a.id));
    formSel.add(new Option(a.label, a.id));
    if (delAcctSel) delAcctSel.add(new Option(a.label, a.id));
  });
}

// --- Load Jobs ---
async function loadJobs() {
  try {
    const res = await rpc('cron.list', {includeDisabled: true});
    allJobs = res.payload?.jobs || res.jobs || [];
    renderJobs();
  } catch (e) {
    document.getElementById('jobs-container').innerHTML = `<div class="empty" style="color:var(--red)">Failed to load: ${e.message}</div>`;
  }
}

// --- Render ---
function renderJobs() {
  const container = document.getElementById('jobs-container');
  const agentFilter = document.getElementById('filter-agent').value;
  const showDisabled = document.getElementById('filter-disabled').checked;

  let jobs = allJobs;
  if (agentFilter) jobs = jobs.filter(j => j.agentId === agentFilter);
  if (!showDisabled) jobs = jobs.filter(j => j.enabled !== false);

  if (!jobs.length) {
    container.innerHTML = '<div class="empty">No cron jobs found</div>';
    return;
  }

  container.innerHTML = jobs.map(j => {
    const state = j.state || {};
    const lastStatus = state.lastStatus || 'pending';
    const schedText = formatSchedule(j.schedule);
    const nextRun = state.nextRunAtMs ? new Date(state.nextRunAtMs).toLocaleString() : '—';
    const lastRun = state.lastRunAtMs ? timeAgo(state.lastRunAtMs) : 'Never';
    const duration = state.lastDurationMs ? (state.lastDurationMs/1000).toFixed(1)+'s' : '—';
    const payload = j.payload || {};
    const msgPreview = (payload.message || payload.text || '').slice(0,100);

    return `<div class="job-card ${j.enabled === false ? 'disabled' : ''}" id="job-${j.id}">
      <div class="job-row">
        <span class="job-name">${esc(j.name || j.id)}</span>
        <span class="job-agent">${esc(j.agentId)}</span>
        <span class="job-schedule">${esc(schedText)}</span>
        <div class="job-status">
          <span class="badge ${lastStatus}">${lastStatus}</span>
          ${j.enabled === false ? '<span class="badge disabled">disabled</span>' : ''}
        </div>
      </div>
      <div class="job-meta">
        <span>📅 Next: ${esc(nextRun)}</span>
        <span>🕐 Last: ${esc(lastRun)}</span>
        <span>⏱ Duration: ${duration}</span>
        <span>🎯 ${payload.kind || '?'}</span>
        ${j.delivery?.mode === 'announce' ? `<span style="color:var(--blue)">📬 ${esc(j.delivery.channel||'')}${j.delivery.to ? ' → '+esc(j.delivery.to) : ''}</span>` : '<span>🔇 Silent</span>'}
        ${state.lastError ? `<span style="color:var(--red)" title="${esc(state.lastError)}">⚠ ${esc(state.lastError.slice(0,50))}</span>` : ''}
      </div>
      ${msgPreview ? `<div style="margin-top:6px;font-size:12px;color:var(--dim);font-style:italic">"${esc(msgPreview)}${msgPreview.length>=100?'...':''}"</div>` : ''}
      <div class="job-actions">
        <button class="run" onclick="runJob('${j.id}')">▶ Run Now</button>
        <button onclick="openEditModal('${j.id}')">✏️ Edit</button>
        <button class="toggle" onclick="toggleJob('${j.id}', ${j.enabled !== false})">${j.enabled !== false ? '⏸ Disable' : '▶ Enable'}</button>
        <button class="delete" onclick="deleteJob('${j.id}', '${esc(j.name||j.id)}')">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

function formatSchedule(s) {
  if (!s) return '?';
  if (s.kind === 'cron') {
    const parts = (s.expr||'').split(/\s+/);
    if (parts.length >= 5) {
      const dayNames = {0:'Sun',1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri',6:'Sat'};
      const h = parseInt(parts[1]); const m = parts[0].padStart(2,'0');
      const ampm = h >= 12 ? 'PM' : 'AM'; const h12 = h === 0 ? 12 : h > 12 ? h-12 : h;
      const timeStr = `${h12}:${m} ${ampm}`;
      let dayStr = 'Every day';
      if (parts[4] !== '*') {
        const days = parts[4].split(',').map(d => dayNames[parseInt(d)] || d);
        if (days.length === 5 && !days.includes('Sat') && !days.includes('Sun')) dayStr = 'Weekdays';
        else if (days.length === 2 && days.includes('Sat') && days.includes('Sun')) dayStr = 'Weekends';
        else dayStr = days.join(', ');
      }
      return `${timeStr} · ${dayStr}`;
    }
    return s.expr;
  }
  if (s.kind === 'every') return `Every ${(s.everyMs/60000).toFixed(0)} min`;
  if (s.kind === 'at') return `Once: ${new Date(s.at).toLocaleString()}`;
  return JSON.stringify(s);
}

function timeAgo(ms) {
  const diff = Date.now() - ms;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return Math.floor(diff/86400000) + 'd ago';
}

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function toggleDeliveryFields() {
  const mode = document.getElementById('f-delivery').value;
  document.getElementById('delivery-fields').style.display = mode === 'announce' ? 'block' : 'none';
}

// --- Day helpers ---
function setDays(preset) {
  const cbs = document.querySelectorAll('.day-cb');
  cbs.forEach(cb => {
    const v = parseInt(cb.value);
    if (preset === 'weekdays') cb.checked = v >= 1 && v <= 5;
    else if (preset === 'weekends') cb.checked = v === 0 || v === 6;
    else if (preset === 'everyday') cb.checked = true;
  });
}

function getSelectedDays() {
  return Array.from(document.querySelectorAll('.day-cb:checked')).map(cb => parseInt(cb.value));
}

function buildCronExpr() {
  const time = document.getElementById('f-cron-time').value || '09:00';
  const [h, m] = time.split(':').map(Number);
  const days = getSelectedDays();
  let dow = '*';
  if (days.length > 0 && days.length < 7) {
    dow = days.sort((a,b) => a-b).join(',');
  }
  return `${m} ${h} * * ${dow}`;
}

function parseCronToFields(expr) {
  // Parse "min hour * * dow" back to time + day checkboxes
  const parts = expr.split(/\s+/);
  if (parts.length < 5) return;
  const min = parts[0].padStart(2,'0');
  const hour = parts[1].padStart(2,'0');
  document.getElementById('f-cron-time').value = `${hour}:${min}`;
  const dow = parts[4];
  const cbs = document.querySelectorAll('.day-cb');
  if (dow === '*') {
    cbs.forEach(cb => cb.checked = true);
  } else {
    const selected = dow.replace(/0-6|1-5|6-7/g, m => {
      // Expand ranges
      const [s,e] = m.split('-').map(Number);
      return Array.from({length:e-s+1}, (_,i) => s+i).join(',');
    }).split(',').map(Number);
    cbs.forEach(cb => cb.checked = selected.includes(parseInt(cb.value)));
  }
}

// --- Actions ---
async function runJob(id) {
  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ Running...';
  try {
    await rpc('cron.run', {id});
    toast('Job triggered!', 'success');
  } catch (e) {
    toast('Run failed: '+e.message, 'error');
  }
  btn.disabled = false; btn.textContent = '▶ Run Now';
  setTimeout(loadJobs, 2000);
}

async function toggleJob(id, currentlyEnabled) {
  try {
    await rpc('cron.update', {id, patch:{enabled: !currentlyEnabled}});
    toast(currentlyEnabled ? 'Job disabled' : 'Job enabled', 'success');
    loadJobs();
  } catch (e) { toast('Toggle failed: '+e.message, 'error'); }
}

async function deleteJob(id, name) {
  if (!confirm(`Delete job "${name}"? This cannot be undone.`)) return;
  try {
    await rpc('cron.remove', {id});
    toast('Job deleted', 'success');
    loadJobs();
  } catch (e) { toast('Delete failed: '+e.message, 'error'); }
}

// --- Modal ---
function openCreateModal() {
  editingJobId = null;
  document.getElementById('modal-title').textContent = 'NEW CRON JOB';
  document.getElementById('modal-save').textContent = 'Create Job';
  clearForm();
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  const job = allJobs.find(j => j.id === id);
  if (!job) return;
  editingJobId = id;
  document.getElementById('modal-title').textContent = 'EDIT CRON JOB';
  document.getElementById('modal-save').textContent = 'Save Changes';
  populateForm(job);
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingJobId = null;
}

function clearForm() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-agent').value = 'main';
  document.getElementById('f-target').value = 'isolated';
  document.getElementById('f-sched-type').value = 'cron';
  document.getElementById('f-cron-time').value = '09:00';
  try { document.getElementById('f-cron-tz').value = Intl.DateTimeFormat().resolvedOptions().timeZone || ''; } catch(e) { document.getElementById('f-cron-tz').value = ''; }
  document.querySelectorAll('.day-cb').forEach(cb => cb.checked = false);
  document.getElementById('f-every-min').value = '';
  document.getElementById('f-at-date').value = '';
  document.getElementById('f-at-time').value = '';
  document.getElementById('f-message').value = '';
  document.getElementById('f-timeout').value = '300';
  document.getElementById('f-delivery').value = 'none';
  document.getElementById('f-del-channel').value = 'telegram';
  document.getElementById('f-del-account').value = '';
  document.getElementById('f-del-to').value = '';
  document.getElementById('f-enabled').checked = true;
  toggleScheduleFields();
  toggleDeliveryFields();
}

function populateForm(job) {
  document.getElementById('f-name').value = job.name || '';
  document.getElementById('f-agent').value = job.agentId || 'main';
  document.getElementById('f-target').value = job.sessionTarget || 'isolated';
  document.getElementById('f-enabled').checked = job.enabled !== false;

  const s = job.schedule || {};
  document.getElementById('f-sched-type').value = s.kind || 'cron';
  if (s.kind === 'cron') {
    parseCronToFields(s.expr || '0 9 * * *');
    document.getElementById('f-cron-tz').value = s.tz || (Intl.DateTimeFormat().resolvedOptions().timeZone || '');
  } else if (s.kind === 'every') {
    document.getElementById('f-every-min').value = s.everyMs ? Math.round(s.everyMs/60000) : '';
  } else if (s.kind === 'at') {
    if (s.at) {
      const d = new Date(s.at);
      document.getElementById('f-at-date').value = d.toISOString().slice(0,10);
      document.getElementById('f-at-time').value = d.toTimeString().slice(0,5);
    }
  }
  toggleScheduleFields();

  const p = job.payload || {};
  document.getElementById('f-message').value = p.message || p.text || '';
  document.getElementById('f-timeout').value = p.timeoutSeconds || 300;
  const del = job.delivery || {};
  document.getElementById('f-delivery').value = del.mode || 'none';
  document.getElementById('f-del-channel').value = del.channel || 'telegram';
  document.getElementById('f-del-account').value = del.accountId || '';
  document.getElementById('f-del-to').value = del.to || '';
  toggleDeliveryFields();
}

function toggleScheduleFields() {
  const type = document.getElementById('f-sched-type').value;
  document.getElementById('sched-cron').style.display = type === 'cron' ? 'block' : 'none';
  document.getElementById('sched-every').style.display = type === 'every' ? 'flex' : 'none';
  document.getElementById('sched-at').style.display = type === 'at' ? 'block' : 'none';
}

async function saveJob() {
  const name = document.getElementById('f-name').value.trim();
  const agentId = document.getElementById('f-agent').value;
  const sessionTarget = document.getElementById('f-target').value;
  const enabled = document.getElementById('f-enabled').checked;
  const message = document.getElementById('f-message').value.trim();
  const timeout = parseInt(document.getElementById('f-timeout').value) || 300;
  const deliveryMode = document.getElementById('f-delivery').value;

  if (!message) { toast('Message/prompt is required', 'error'); return; }

  // Build schedule
  const schedType = document.getElementById('f-sched-type').value;
  let schedule;
  if (schedType === 'cron') {
    const days = getSelectedDays();
    if (!days.length) { toast('Select at least one day', 'error'); return; }
    const expr = buildCronExpr();
    schedule = {kind:'cron', expr, tz: document.getElementById('f-cron-tz').value.trim() || undefined};
  } else if (schedType === 'every') {
    const min = parseInt(document.getElementById('f-every-min').value);
    if (!min || min < 1) { toast('Interval must be ≥1 minute', 'error'); return; }
    schedule = {kind:'every', everyMs: min * 60000};
  } else if (schedType === 'at') {
    const d = document.getElementById('f-at-date').value;
    const t = document.getElementById('f-at-time').value;
    if (!d || !t) { toast('Date and time required', 'error'); return; }
    schedule = {kind:'at', at: new Date(`${d}T${t}`).toISOString()};
  }

  // Build payload
  let payload;
  if (sessionTarget === 'main') {
    payload = {kind:'systemEvent', text: message};
  } else {
    payload = {kind:'agentTurn', message, timeoutSeconds: timeout};
  }

  const job = {name, schedule, payload, sessionTarget, enabled};
  if (deliveryMode === 'announce') {
    const delChannel = document.getElementById('f-del-channel').value;
    const delAccount = document.getElementById('f-del-account').value;
    const delTo = document.getElementById('f-del-to').value.trim();
    if (!delTo) { toast('Delivery "Send To" is required when announcing', 'error'); return; }
    job.delivery = {mode: 'announce', channel: delChannel, to: delTo};
    if (delAccount) job.delivery.accountId = delAccount;
  } else {
    job.delivery = {mode: 'none'};
  }

  const btn = document.getElementById('modal-save');
  btn.disabled = true; btn.textContent = 'Saving...';

  try {
    if (editingJobId) {
      await rpc('cron.update', {id: editingJobId, patch: {...job, agentId}});
      toast('Job updated!', 'success');
    } else {
      job.agentId = agentId;
      await rpc('cron.add', job);
      toast('Job created!', 'success');
    }
    closeModal();
    loadJobs();
  } catch (e) {
    toast('Save failed: '+e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = editingJobId ? 'Save Changes' : 'Create Job';
}

// --- Toast ---
function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// --- Init ---
// Detect user timezone
try {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if (tz) document.getElementById('f-cron-tz').value = tz;
} catch(e) {}
initAgentDropdowns();
// connectGateway() is called after /gateway-info loads (see async IIFE above)
</script>
