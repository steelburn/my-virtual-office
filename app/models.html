<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#070b13">
    <title>Model Settings - Virtual Office</title>
    <script>fetch('/vo-config').then(r=>r.json()).then(d=>{if(d.office&&d.office.name)document.title='Model Settings - '+d.office.name;}).catch(()=>{});</script>
    <script>try{document.documentElement.dataset.uiTheme=localStorage.getItem('vo-ui-theme')==='light'?'light':'dark';let p=localStorage.getItem('vo-ui-preset')||'classic';document.documentElement.dataset.uiPreset=/^(classic|retro|cyberpunk|gameboy|custom)$/.test(p)?p:'classic'}catch(e){document.documentElement.dataset.uiTheme='dark';document.documentElement.dataset.uiPreset='classic'}</script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0d0d1a; --surface:#141428; --border:#2a2a4a; --gold:#ffd700; --text:#d8d8e8; --text-dim:#8f91aa; --green:#4caf50; --red:#f44336; --blue:#2196f3; --purple:#8b5cf6; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--text); font-family:'Press Start 2P', monospace; font-size:8px; line-height:1.6; padding:10px; }
        h1 { font-size:12px; color:var(--gold); margin-bottom:12px; }
        h2 { font-size:9px; color:var(--gold); margin:14px 0 8px; }
        h3 { font-size:8px; color:var(--gold); margin:10px 0 6px; }
        p { margin:5px 0; }
        .back-btn { display:inline-block; padding:6px 12px; background:var(--surface); color:var(--gold); border:1px solid var(--border); border-radius:4px; cursor:pointer; font-family:inherit; font-size:7px; margin-bottom:10px; text-decoration:none; }
        .tabs { display:flex; gap:4px; margin-bottom:12px; flex-wrap:wrap; }
        .tab { padding:6px 10px; background:var(--surface); border:1px solid var(--border); border-radius:4px 4px 0 0; cursor:pointer; font-family:inherit; font-size:7px; color:var(--text-dim); }
        .tab.active { background:var(--border); color:var(--gold); }
        .panel { display:none; }
        .panel.active { display:block; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:10px; margin-bottom:10px; }
        .provider-header { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
        .provider-header > * { min-width:0; }
        .provider-name { font-size:9px; color:var(--gold); overflow-wrap:anywhere; }
        .provider-current { color:var(--text-dim); text-align:right; max-width:46%; overflow-wrap:anywhere; word-break:break-word; }
        .muted { color:var(--text-dim); }
        .ok { color:var(--green); }
        .err { color:var(--red); }
        .tag { display:inline-block; padding:2px 5px; border:1px solid var(--border); border-radius:3px; margin:2px; color:var(--text-dim); }
        input, select, textarea { font-family:'Press Start 2P', monospace; font-size:7px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:3px; padding:5px 6px; width:100%; }
        textarea { min-height:64px; resize:vertical; }
        .row { display:flex; gap:6px; align-items:center; margin:6px 0; flex-wrap:wrap; }
        .row label { min-width:102px; color:var(--text-dim); flex-shrink:0; }
        .row input, .row select, .row textarea { flex:1; min-width:190px; }
        .btn { padding:5px 10px; font-family:inherit; font-size:7px; border:none; border-radius:3px; cursor:pointer; white-space:nowrap; margin:2px 2px 2px 0; }
        .btn-gold { background:var(--gold); color:#000; }
        .btn-green { background:var(--green); color:#fff; }
        .btn-red { background:var(--red); color:#fff; }
        .btn-blue { background:var(--blue); color:#fff; }
        .btn-purple { background:var(--purple); color:#fff; }
        .model-list { max-height:280px; overflow-y:auto; margin:6px 0; border:1px solid var(--border); border-radius:4px; }
        .model-item { padding:4px 6px; font-size:7px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:8px; align-items:center; }
        .model-item span { min-width:0; overflow-wrap:anywhere; word-break:break-word; }
        .model-item:last-child { border-bottom:none; }
        .auth-help .model-item { align-items:flex-start; }
        .auth-help .model-item span:first-child { color:var(--gold); }
        .mvw-confirm-overlay { position:fixed; inset:0; z-index:1000; display:grid; place-items:center; padding:18px; background:rgba(5,5,12,.78); }
        .mvw-confirm-overlay[hidden] { display:none; }
        .mvw-confirm-dialog { width:min(460px, 100%); background:var(--surface); border:1px solid var(--gold); border-radius:6px; padding:14px; box-shadow:0 20px 70px rgba(0,0,0,.55); }
        .mvw-confirm-title { color:var(--gold); font-size:9px; margin-bottom:8px; }
        .mvw-confirm-message { color:var(--text); margin-bottom:12px; overflow-wrap:anywhere; }
        .mvw-confirm-actions { display:flex; justify-content:flex-end; gap:6px; flex-wrap:wrap; }
        .status-msg { font-size:7px; margin:6px 0; min-height:12px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:10px; }
        .wide { grid-column:1 / -1; }
        .checkbox-row { display:flex; align-items:center; gap:6px; color:var(--text-dim); margin:6px 0; }
        .checkbox-row input { width:auto; min-width:0; }
        .provider-tools { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
        .model-editor { font-family:monospace; font-size:11px; line-height:1.35; min-height:92px; }
        @media (max-width:700px) {
            .provider-header { flex-direction:column; }
            .provider-current { max-width:100%; text-align:left; }
        }
        code { color:var(--gold); overflow-wrap:anywhere; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    </style>

</head>
<body class="ui-standalone models-page">
    <div class="models-header">
        <a class="back-btn" href="/">← Office</a>
        <h1>⚙️ MODEL & PROVIDER SETTINGS</h1>
        <button type="button" class="ui-theme-toggle" data-ui-theme-toggle>☀️ Light</button>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="showTab(event,'openclaw')">🧠 OpenClaw Models</div>
        <div class="tab" onclick="showTab(event,'hermes')">☤ Hermes Models</div>
        <div class="tab" onclick="showTab(event,'codex')">⌘ Codex CLI</div>
        <div class="tab" onclick="showTab(event,'claude-code')">◇ Claude Code</div>
        <div class="tab" onclick="showTab(event,'setup')">⚙️ Native Setup</div>
    </div>
    <div id="panel-openclaw" class="panel active"><div id="openclaw-models">Loading...</div></div>
    <div id="panel-hermes" class="panel"><div id="hermes-models">Loading...</div></div>
    <div id="panel-codex" class="panel"><div id="codex-models">Loading...</div></div>
    <div id="panel-claude-code" class="panel"><div id="claude-code-models">Loading...</div></div>
    <div id="panel-setup" class="panel"><div id="native-setup">Loading...</div></div>
    <div id="mvw-confirm-overlay" class="mvw-confirm-overlay" hidden>
        <div class="mvw-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="mvw-confirm-title">
            <div id="mvw-confirm-title" class="mvw-confirm-title">Confirm Action</div>
            <div id="mvw-confirm-message" class="mvw-confirm-message"></div>
            <div class="mvw-confirm-actions">
                <button id="mvw-confirm-cancel" class="btn" type="button">Cancel</button>
                <button id="mvw-confirm-ok" class="btn btn-red" type="button">Continue</button>
            </div>
        </div>
    </div>

<script>
let nativeData = null;
let pendingScrollRestore = null;
let activeConfirmResolve = null;

function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function val(id) {
    const el = document.getElementById(id);
    return el ? el.value.trim() : '';
}

function setStatus(id, data, okText = 'Saved') {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'status-msg ' + (data.ok ? 'ok' : 'err');
    el.textContent = data.ok ? okText : (data.error || 'Failed');
}

function restoreScrollSoon(state) {
    if (!state) return;
    requestAnimationFrame(() => {
        window.scrollTo(state.x || 0, state.y || 0);
        requestAnimationFrame(() => window.scrollTo(state.x || 0, state.y || 0));
    });
}

function refreshNativeSoon(delay = 800) {
    const scrollState = { x: window.scrollX || 0, y: window.scrollY || 0 };
    setTimeout(() => reloadNative({ preserveScroll: scrollState, quiet: true }), delay);
}

function closeConfirmDialog(result) {
    const overlay = document.getElementById('mvw-confirm-overlay');
    if (overlay) overlay.hidden = true;
    const resolve = activeConfirmResolve;
    activeConfirmResolve = null;
    if (resolve) resolve(Boolean(result));
}

function confirmAction(message, options = {}) {
    const overlay = document.getElementById('mvw-confirm-overlay');
    const titleEl = document.getElementById('mvw-confirm-title');
    const messageEl = document.getElementById('mvw-confirm-message');
    const cancelEl = document.getElementById('mvw-confirm-cancel');
    const okEl = document.getElementById('mvw-confirm-ok');
    if (!overlay || !titleEl || !messageEl || !cancelEl || !okEl) {
        return Promise.resolve(false);
    }
    if (activeConfirmResolve) closeConfirmDialog(false);
    titleEl.textContent = options.title || 'Confirm Action';
    messageEl.textContent = message || 'Continue?';
    cancelEl.textContent = options.cancelText || 'Cancel';
    okEl.textContent = options.okText || 'Continue';
    okEl.className = 'btn ' + (options.danger === false ? 'btn-green' : 'btn-red');
    overlay.hidden = false;
    okEl.focus({ preventScroll:true });
    return new Promise(resolve => {
        activeConfirmResolve = resolve;
    });
}

document.getElementById('mvw-confirm-cancel')?.addEventListener('click', () => closeConfirmDialog(false));
document.getElementById('mvw-confirm-ok')?.addEventListener('click', () => closeConfirmDialog(true));
document.getElementById('mvw-confirm-overlay')?.addEventListener('click', event => {
    if (event.target === event.currentTarget) closeConfirmDialog(false);
});
document.addEventListener('keydown', event => {
    if (event.key === 'Escape' && activeConfirmResolve) closeConfirmDialog(false);
});

function showTab(event, name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
}

async function loadNativeModels(options = {}) {
    const res = await fetch('/api/native-models?agent=main', { cache:'no-store' });
    nativeData = await res.json();
    renderOpenClaw();
    renderHermes();
    renderCodex();
    renderClaudeCode();
    renderSetup();
    if (pendingScrollRestore) {
        const state = pendingScrollRestore;
        pendingScrollRestore = null;
        restoreScrollSoon(state);
    }
}

function modelOptions(models, current, providerFilter) {
    const filtered = (models || [])
        .filter(m => !providerFilter || m.provider === providerFilter)
        .filter(m => !m.missing)
        .sort((a,b) => (a.provider + a.name).localeCompare(b.provider + b.name));
    return filtered.map(m => {
        const label = (m.provider ? m.provider + '/' : '') + (m.name || m.id);
        return `<option value="${esc(m.id)}" ${m.id === current ? 'selected' : ''}>${esc(label)}</option>`;
    }).join('');
}

function providerOptions(providers, current) {
    return (providers || []).sort().map(p => `<option value="${esc(p)}" ${p === current ? 'selected' : ''}>${esc(p)}</option>`).join('');
}

function authIssueText(row) {
    const bits = [];
    if ((row.missingManagedStatic || []).length) bits.push('missing ' + row.missingManagedStatic.length);
    if ((row.divergentManagedStatic || []).length) bits.push('stale ' + row.divergentManagedStatic.length);
    if ((row.extraStaticProfiles || []).length) bits.push('extra ' + row.extraStaticProfiles.length);
    if (!bits.length) return 'static profiles synced';
    return bits.join(' · ');
}

function profileListText(values) {
    return (values || []).length ? values.join(', ') : 'none';
}

function syncedManagedProfileIds(row, profiles) {
    const profileIds = profiles.map(p => p.id).filter(Boolean);
    const missing = new Set(row.missingManagedStatic || []);
    const stale = new Set(row.divergentManagedStatic || []);
    return profileIds.filter(id => !missing.has(id) && !stale.has(id));
}

function renderOpenClawManagedAuth(oc) {
    const managed = oc.managedAuth || {};
    const rows = managed.agentRows || [];
    const profiles = managed.managedStaticProfiles || [];
    const driftRows = rows.filter(row => row.agent !== 'main' && !row.staticInSync);
    return `<div class="card wide">
        <div class="provider-header">
            <div>
                <div class="provider-name">Virtual Office Global Auth</div>
                <div class="muted">Source <code>${esc(managed.sourceAgent || 'main')}</code> · ${profiles.length} managed static profile${profiles.length === 1 ? '' : 's'} · ${driftRows.length} agent${driftRows.length === 1 ? '' : 's'} need sync</div>
            </div>
            <button class="btn btn-blue" onclick="syncOpenClawStaticAuth()">Sync Static Profiles</button>
        </div>
        <div class="model-list auth-help">
            <div class="model-item"><span>Managed Static Profiles</span><span>uses <code>main</code> as the source for API-key and static-token profiles.</span></div>
            <div class="model-item"><span>Sync Static Profiles</span><span>copies the managed static profiles from <code>main</code> into every known OpenClaw agent store.</span></div>
            <div class="model-item"><span>Agent Auth Stores</span><span>shows whether each agent matches <code>main</code>, is missing a managed profile, has a stale copy, or has extra local static profiles.</span></div>
            <div class="model-item"><span>Reset Static Overrides</span><span>for one agent, copies managed profiles from <code>main</code> and removes extra static profiles. OAuth profiles are left alone.</span></div>
        </div>
        <h3>Managed Static Profiles</h3>
        ${profiles.length ? renderAuthTags(profiles) : '<div class="muted">No portable API-key or static-token profiles are managed from main yet.</div>'}
        <p id="oc-managed-auth-status" class="status-msg"></p>
        <h3>Agent Auth Stores</h3>
        <div class="model-list">${rows.length ? rows.map(row => {
            const issue = authIssueText(row);
            const synced = row.agent === 'main'
                ? profiles.map(p => p.id).filter(Boolean)
                : syncedManagedProfileIds(row, profiles);
            const detail = [
                'synced: ' + profileListText(synced),
                (row.missingManagedStatic || []).length ? 'missing: ' + row.missingManagedStatic.join(', ') : '',
                (row.divergentManagedStatic || []).length ? 'stale: ' + row.divergentManagedStatic.join(', ') : '',
                (row.extraStaticProfiles || []).length ? 'extra: ' + row.extraStaticProfiles.join(', ') : '',
                (row.localOAuthProfiles || []).length ? 'local OAuth: ' + row.localOAuthProfiles.join(', ') : '',
            ].filter(Boolean).join(' · ');
            return `<div class="model-item">
                <span>${esc(row.agent)} · ${esc(issue)}${detail ? `<br><small>${esc(detail)}</small>` : ''}</span>
                <span>${row.agent === 'main' ? 'source' : (row.staticInSync ? 'ok' : `<button class="btn btn-red" onclick="resetOpenClawAuthOverrides('${esc(row.agent)}')">Reset Static Overrides</button>`)}</span>
            </div>`;
        }).join('') : '<div class="model-item"><span>No OpenClaw agent auth stores reported.</span><span></span></div>'}</div>
    </div>`;
}

function modelsText(models) {
    return (models || []).map(m => m.id || m.name || '').filter(Boolean).join('\n');
}

function localProviderSummary(provider) {
    const bits = [];
    if (provider.baseUrl) bits.push(provider.baseUrl);
    if (provider.api) bits.push(provider.api);
    if (provider.timeoutSeconds) bits.push('timeout ' + provider.timeoutSeconds + 's');
    if (provider.apiKeyConfigured) bits.push('API key saved');
    return bits.join(' · ') || 'No extra settings';
}

function renderOpenClawLocalProviders(oc) {
    const providers = oc.localProviders || [];
    if (!providers.length) {
        return `<div class="card wide">
            <div class="provider-name">Installed Local Providers</div>
            <p class="muted">No local/custom OpenClaw providers are configured yet. Add Ollama, LM Studio, or an OpenAI-compatible endpoint below.</p>
        </div>`;
    }
    return `<div class="card wide">
        <div class="provider-header">
            <div><div class="provider-name">Installed Local Providers</div><div class="muted">${providers.length} configured provider${providers.length === 1 ? '' : 's'} from <code>models.providers</code></div></div>
        </div>
        <div class="grid">${providers.map((provider, idx) => `
            <div class="card">
                <div class="provider-header">
                    <div><div class="provider-name">${esc(provider.provider)}</div><div class="muted">${esc(localProviderSummary(provider))}</div></div>
                    <div class="provider-tools">
                        <button class="btn btn-green" onclick="saveOpenClawLocalProvider(${idx})">Save</button>
                        <button class="btn btn-red" onclick="deleteOpenClawProviderById('${esc(provider.provider)}', 'oc-local-provider-status-${idx}')">Delete</button>
                    </div>
                </div>
                <div class="row"><label>Provider ID</label><input id="oc-local-provider-id-${idx}" value="${esc(provider.provider)}"></div>
                <div class="row"><label>Base URL</label><input id="oc-local-provider-url-${idx}" value="${esc(provider.baseUrl || '')}" placeholder="http://localhost:1234/v1"></div>
                <div class="row"><label>API</label><select id="oc-local-provider-api-${idx}">
                    <option value="openai-completions" ${(provider.api || '') !== 'ollama' ? 'selected' : ''}>OpenAI-compatible</option>
                    <option value="ollama" ${(provider.api || '') === 'ollama' ? 'selected' : ''}>Ollama native</option>
                </select></div>
                <div class="row"><label>Timeout</label><input id="oc-local-provider-timeout-${idx}" type="number" min="1" value="${esc(provider.timeoutSeconds || '')}" placeholder="300"></div>
                <div class="row"><label>API Key</label><input id="oc-local-provider-key-${idx}" type="password" autocomplete="off" placeholder="${provider.apiKeyConfigured ? 'Configured - leave blank to keep' : 'optional'}"></div>
                <div class="row"><label>Models</label><textarea class="model-editor" id="oc-local-provider-models-${idx}" placeholder="one model per line">${esc(modelsText(provider.models))}</textarea></div>
                <p class="muted">Add or remove models by editing this list, then Save.</p>
                <p id="oc-local-provider-status-${idx}" class="status-msg"></p>
            </div>
        `).join('')}</div>
    </div>`;
}

function renderOpenClawCloudProviders(oc) {
    const providers = oc.cloudProviders || [];
    if (!providers.length) {
        return `<div class="card wide">
            <div class="provider-name">Cloud Service Providers</div>
            <p class="muted">No cloud provider auth profiles or configured cloud models were reported.</p>
        </div>`;
    }
    return `<div class="card wide">
        <div class="provider-header">
            <div><div class="provider-name">Cloud Service Providers</div><div class="muted">${providers.length} configured cloud provider${providers.length === 1 ? '' : 's'} with API/OAuth/subscription auth state</div></div>
        </div>
        <div class="grid">${providers.map((provider, idx) => {
            const profiles = provider.authProfiles || [];
            return `<div class="card">
                <div class="provider-header">
                    <div><div class="provider-name">${esc(provider.provider)}</div><div class="muted">cloud service · ${(provider.models || []).length} configured model${(provider.models || []).length === 1 ? '' : 's'}</div></div>
                    <div class="provider-current">${profiles.length ? esc((provider.authTypes || []).join(', ') || 'auth configured') : 'no auth profile'}</div>
                </div>
                <h3>Auth</h3>
                ${profiles.length ? renderAuthTags(profiles) : '<div class="muted">No API key, OAuth, or subscription profile reported for this provider.</div>'}
                <div class="row"><label>Profile ID</label><input id="oc-cloud-profile-${idx}" placeholder="${esc(provider.provider)}:manual"></div>
                <div class="row"><label>API Key</label><input id="oc-cloud-key-${idx}" type="password" autocomplete="off" placeholder="paste API key"></div>
                <button class="btn btn-green" onclick="saveOpenClawCloudApiKey(${idx})">Save API Key</button>
                ${profiles.length ? `<div class="row"><label>Delete Profile</label><select id="oc-cloud-delete-${idx}">${profiles.map(p => `<option value="${esc(p.id || p.profileId || '')}">${esc(p.id || p.profileId || p.label || '')}</option>`).join('')}</select></div><button class="btn btn-red" onclick="deleteOpenClawCloudApiKey(${idx})">Delete Auth Profile</button>` : ''}
                <p id="oc-cloud-status-${idx}" class="status-msg"></p>
                <h3>Models</h3>
                <div class="model-list">${(provider.models || []).length ? provider.models.map(m => `<div class="model-item"><span>${esc(m.id)}</span><span>${esc(m.source || 'configured')}</span></div>`).join('') : '<div class="model-item"><span>No configured models reported.</span><span></span></div>'}</div>
            </div>`;
        }).join('')}</div>
    </div>`;
}

function renderOpenClaw() {
    const root = document.getElementById('openclaw-models');
    const oc = nativeData.openclaw || {};
    if (!oc.ok) {
        root.innerHTML = `<div class="card err">OpenClaw model catalog failed: ${esc(oc.error || 'unknown error')}</div>`;
        return;
    }
    const agents = Object.values(oc.agents || {}).sort((a,b) => a.id.localeCompare(b.id));
    const byProvider = {};
    const localProviderIds = (oc.localProviders || []).map(p => p.provider).filter(Boolean);
    for (const m of oc.models || []) (byProvider[m.provider || 'unknown'] ||= []).push(m);
    let html = `<div class="grid">
        <div class="card wide">
            <div class="provider-header">
                <div><div class="provider-name">OpenClaw Available Models</div><div class="muted">${(oc.models||[]).length} models · ${(oc.providers||[]).length} providers · default <code>${esc(oc.defaultModel || 'none')}</code></div></div>
                <button class="btn btn-blue" onclick="reloadNative()">Refresh</button>
            </div>
            <h3>Auth Profiles</h3>${renderAuthTags(oc.authProfiles)}
        </div>
        ${renderOpenClawManagedAuth(oc)}
        ${renderOpenClawCloudProviders(oc)}
        ${renderOpenClawLocalProviders(oc)}
        <div class="card">
            <div class="provider-name">Add Local or Custom Provider</div>
            <p class="muted">Saving an existing Provider ID updates that provider's model list.</p>
            <div class="row"><label>Preset</label><select id="oc-provider-preset" onchange="fillOpenClawPreset()"><option value="custom">Custom OpenAI-compatible</option><option value="ollama">Ollama</option><option value="lmstudio">LM Studio</option></select></div>
            <div class="row"><label>Provider ID</label><input id="oc-provider-id" value="custom"></div>
            <div class="row"><label>Base URL</label><input id="oc-provider-url" placeholder="http://localhost:1234/v1"></div>
            <div class="row"><label>API</label><select id="oc-provider-api"><option value="openai-completions">OpenAI-compatible</option><option value="ollama">Ollama native</option></select></div>
            <div class="row"><label>API Key</label><input id="oc-provider-key" type="password" autocomplete="off" placeholder="optional"></div>
            <div class="row"><label>Models</label><textarea id="oc-provider-models" placeholder="one model per line"></textarea></div>
            <button class="btn btn-green" onclick="saveOpenClawProvider()">Save Provider</button>
            <p id="oc-provider-status" class="status-msg"></p>
        </div>

async function postJson(url, body) {
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    return await res.json();
}

async function testCodexSetup() {
    const status = document.getElementById('setup-codex-status');
    if (status) {
        status.className = 'status-msg muted';
        status.textContent = 'Testing Codex CLI...';
    }
    await postJson('/setup/save', { codex: codexSetupPayload() });
    const data = await postJson('/api/codex/test', codexSetupPayload());
    const text = data.ok
        ? 'Codex connected · ' + (data.protocol || 'codex') + ' · ' + ((data.agents || []).length) + ' agent' + (((data.agents || []).length) === 1 ? '' : 's')
        : (data.error || 'Codex test failed');
    if (status) {
        status.className = 'status-msg ' + (data.ok ? 'ok' : 'err');
        status.textContent = text;
    }
    if (data.ok) refreshNativeSoon();
}

async function deleteOpenClawApiKey() {
    const profileId = val('oc-key-delete-profile');

        'Delete OpenClaw auth profile ' + profileId + ' from all agents?',
        { title:'Delete Auth Profile', okText:'Delete Profile' }
    ))) return;
    const provider = profileId.includes(':') ? profileId.split(':')[0] : '';
    const data = await postJson('/api/native-models/openclaw/auth/delete', { scope:'global', provider, profileId });
    setStatus('oc-key-status', data, 'Deleted globally ' + profileId);
    if (data.ok) refreshNativeSoon();
}

    const data = await postJson('/api/native-models/openclaw/provider', { provider:val('oc-provider-id'), baseUrl:val('oc-provider-url'), api:val('oc-provider-api'), apiKey:val('oc-provider-key'), models:val('oc-provider-models') });
    setStatus('oc-provider-status', data, 'Saved ' + (data.provider || 'provider'));
    if (data.ok) { document.getElementById('oc-provider-key').value = ''; refreshNativeSoon(); }
}

async function saveOpenClawLocalProvider(index) {
    const timeoutRaw = val('oc-local-provider-timeout-' + index);
    const body = {
        provider: val('oc-local-provider-id-' + index),
        baseUrl: val('oc-local-provider-url-' + index),
        api: val('oc-local-provider-api-' + index),
        apiKey: val('oc-local-provider-key-' + index),
        timeoutSeconds: timeoutRaw ? Number(timeoutRaw) : null,
        models: val('oc-local-provider-models-' + index)
    };
    const data = await postJson('/api/native-models/openclaw/provider', body);
    setStatus('oc-local-provider-status-' + index, data, 'Saved ' + (data.provider || body.provider));
    if (data.ok) {
        const keyEl = document.getElementById('oc-local-provider-key-' + index);
        if (keyEl) keyEl.value = '';
        refreshNativeSoon();
    }
}

async function deleteOpenClawProvider() {
    const provider = val('oc-delete-provider');
    return deleteOpenClawProviderById(provider, 'oc-delete-status');
}

async function deleteOpenClawProviderById(provider, statusId = 'oc-delete-status') {
    if (!provider || !(await confirmAction(
        'Delete OpenClaw provider ' + provider + '?',
        { title:'Delete Provider', okText:'Delete Provider' }
    ))) return;
    const data = await postJson('/api/native-models/openclaw/provider/delete', { provider });
    setStatus(statusId, data, 'Deleted ' + provider);
    if (data.ok) refreshNativeSoon();
}

async function setOpenClawAgentModel(agentId) {
    const selectedModel = val('oc-agent-' + agentId);
    const data = await postJson('/api/native-models/openclaw/agent-model', { agent:agentId, model:selectedModel });
    setStatus('oc-agent-status-' + agentId, data, 'Applied');
    if (data.ok) {
        try {
            if (window.parent && window.parent !== window) {
                window.parent.dispatchEvent(new CustomEvent('vo:agent-model-changed', {
                    detail: {
                        agentId,
                        providerKind: 'openclaw',
                        model: data.model || selectedModel || '',
                        defaulted: Boolean(data.defaulted),
                    }
                }));
                window.parent.dispatchEvent(new CustomEvent('vo:agents-changed', { detail: { reason: 'model-changed', agentId } }));
            }
        } catch (_) {}
        refreshNativeSoon();
    }
}

async function saveHermesApiKey() {
    const data = await postJson('/api/native-models/hermes/auth/api-key', { provider:val('hm-key-provider'), label:val('hm-key-label'), apiKey:val('hm-key-value') });
    setStatus('hm-key-status', data, 'Saved ' + (data.label || data.provider));
    if (data.ok) { document.getElementById('hm-key-value').value = ''; refreshNativeSoon(); }
}

async function saveHermesProvider() {
    const data = await postJson('/api/native-models/hermes/provider', { profile:val('hm-provider-profile'), provider:val('hm-provider-id'), baseUrl:val('hm-provider-url'), models:val('hm-provider-models') });
    setStatus('hm-provider-status', data, 'Saved ' + (data.provider || 'provider'));
    if (data.ok) refreshNativeSoon();
}

async function saveHermesLocalProvider(index) {
    const body = {
        profile: val('hm-local-provider-profile-' + index) || 'default',
        provider: val('hm-local-provider-id-' + index),
        baseUrl: val('hm-local-provider-url-' + index),
        models: val('hm-local-provider-models-' + index)
    };
    const data = await postJson('/api/native-models/hermes/provider', body);
    setStatus('hm-local-provider-status-' + index, data, 'Saved ' + (data.provider || body.provider));
    if (data.ok) refreshNativeSoon();
}

async function deleteHermesProvider() {
    const provider = val('hm-delete-provider');
    return deleteHermesProviderByValues(val('hm-delete-profile'), provider, 'hm-delete-status');
}

async function deleteHermesLocalProvider(index) {
    return deleteHermesProviderByValues(
        val('hm-local-provider-profile-' + index),
        val('hm-local-provider-id-' + index),
        'hm-local-provider-status-' + index
    );
}

async function deleteHermesProviderByValues(profile, provider, statusId = 'hm-delete-status') {
    if (!provider || !(await confirmAction(
        'Delete Hermes custom aliases/cache for ' + provider + '?',
        { title:'Delete Hermes Provider', okText:'Delete Provider' }
    ))) return;
    const data = await postJson('/api/native-models/hermes/provider/delete', { profile: profile || 'default', provider });
    setStatus(statusId, data, 'Deleted ' + provider);
    if (data.ok) refreshNativeSoon();
}

async function deleteHermesAuth() {
    const data = await postJson('/api/native-models/hermes/auth/delete', { provider:val('hm-delete-provider'), target:val('hm-delete-auth-target') });
    setStatus('hm-delete-status', data, 'Deleted auth');
    if (data.ok) refreshNativeSoon();
}

async function setHermesProfileModel(profileId) {
    const modelValue = val('hm-model-' + profileId);
    const model = modelValue.includes('/') ? modelValue.split('/').slice(1).join('/') : modelValue;
    const data = await postJson('/api/native-models/hermes/profile-model', { profile:profileId, provider:val('hm-prov-' + profileId), model });
    setStatus('hm-status-' + profileId, data, 'Applied');
    if (data.ok) refreshNativeSoon();
}

function reloadNative(options = {}) {
    if (options.preserveScroll) pendingScrollRestore = options.preserveScroll;
    if (!options.quiet) {
        document.getElementById('openclaw-models').textContent = 'Loading...';
        document.getElementById('hermes-models').textContent = 'Loading...';
        document.getElementById('codex-models').textContent = 'Loading...';
        document.getElementById('claude-code-models').textContent = 'Loading...';
        document.getElementById('native-setup').textContent = 'Loading...';
    }
    loadNativeModels().catch(e => {
        document.getElementById('openclaw-models').innerHTML = `<div class="card err">${esc(e.message)}</div>`;
    });
}

reloadNative();
