services:
  virtual-office:
    image: ghcr.io/eliautobot/my-virtual-office:latest
    container_name: virtual-office
    ports:
      - "${VO_PORT:-8090}:${VO_PORT:-8090}"
      - "${VO_WS_PORT:-8091}:${VO_WS_PORT:-8091}"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Makes host.docker.internal work on Linux too
    volumes:
      # Mount OpenClaw home directory (read-write for model/key management)
      - ${VO_OPENCLAW_PATH:-~/.openclaw}:/openclaw
      # Persistent office data (layout, presence snapshots, config)
      - vo-data:/data
    environment:
      - VO_OPENCLAW_PATH=/openclaw
      - VO_STATUS_DIR=/data
      - VO_GATEWAY_URL=${VO_GATEWAY_URL:-ws://host.docker.internal:18789}
      - VO_GATEWAY_HTTP=${VO_GATEWAY_HTTP:-http://host.docker.internal:18789}
      - VO_PORT=${VO_PORT:-8090}
      - VO_WS_PORT=${VO_WS_PORT:-8091}
      - VO_OFFICE_NAME=${VO_OFFICE_NAME:-Virtual Office}
      - VO_WEATHER_LOCATION=${VO_WEATHER_LOCATION:-}
      # Optional native Codex support. Install codex in the image/container PATH
      # or set VO_CODEX_BIN to an absolute path available inside the container.
      - CODEX_HOME=${VO_CODEX_HOME:-/data/codex-home}
      - VO_CODEX_HOME=${VO_CODEX_HOME:-/data/codex-home}
      - VO_CODEX_BIN=${VO_CODEX_BIN:-codex}
      - VO_CODEX_WORKSPACE_ROOT=${VO_CODEX_WORKSPACE_ROOT:-/data/codex-agents}
      - VO_CODEX_MAIN_WORKSPACE=${VO_CODEX_MAIN_WORKSPACE:-/data/codex-main}
      - VO_CODEX_PREFER_APP_SERVER=${VO_CODEX_PREFER_APP_SERVER:-1}
      - VO_CODEX_SANDBOX=${VO_CODEX_SANDBOX:-danger-full-access}
      - VO_CODEX_APPROVAL_POLICY=${VO_CODEX_APPROVAL_POLICY:-never}
      - VO_CODEX_INCLUDE_MAIN=${VO_CODEX_INCLUDE_MAIN:-1}
      - VO_CODEX_INCLUDE_NATIVE_AGENTS=${VO_CODEX_INCLUDE_NATIVE_AGENTS:-1}
      - VO_CODEX_REGISTER_NATIVE_AGENTS=${VO_CODEX_REGISTER_NATIVE_AGENTS:-1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${VO_PORT:-8090}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Agent Browser (uncomment to enable)
  # Gives AI agents a real Google Chrome browser they can control via CDP.
  # You can watch them browse live through the Virtual Office browser panel.
  # Includes full Chrome Sync, "Sign in to Chrome", and Google password manager.
  #
  # After first start, run the post-boot script to install Chrome:
  #   docker exec --user root agent-browser bash /tmp/post-boot.sh
  #   docker exec agent-browser pkill -f chromium-orig
  #   docker exec -e DISPLAY=:10 -d agent-browser /usr/bin/chromium
  #
  # On subsequent restarts, Chrome persists unless the container is recreated.
  # The kasm-browser-config/ folder contains all config files.
  #
  # agent-browser:
  #   image: kasmweb/chromium:1.17.0
  #   container_name: agent-browser
  #   entrypoint: /dockerstartup/kasm_default_profile.sh
  #   command: ["/tmp/override-startup.sh", "/dockerstartup/kasm_startup.sh", "--wait"]
  #   shm_size: 1g   # Prevents Chromium crashes from insufficient shared memory
  #   ports:
  #     - "6901:6901"   # KasmVNC viewer
  #     - "9222:9222"   # CDP endpoint
  #   environment:
  #     - VNC_PW=${BROWSER_VNC_PASSWORD:-changeme}
  #     - VNC_RESOLUTION=1600x900
  #     - KASMVNC_AUTO_RECOVER=true
  #   volumes:
  #     - browser-data:/home/kasm-user/.config/chromium
  #     - ./kasm-browser-config/chromium-browser:/usr/bin/chromium
  #     - ./kasm-browser-config/override-startup.sh:/tmp/override-startup.sh
  #     - ./kasm-browser-config/start-cdp-proxy.sh:/tmp/start-cdp-proxy.sh
  #     - ./kasm-browser-config/post-boot.sh:/tmp/post-boot.sh
  #     - ./kasm-browser-config/install-chrome.sh:/tmp/install-chrome.sh
  #     - ./kasm-browser-config/browser-supervisor.sh:/tmp/browser-supervisor.sh
  #   restart: unless-stopped
  #   # Configure in Virtual Office Settings → Agent Browser:
  #   #   CDP URL: http://host.docker.internal:9222
  #   #   Viewer URL: https://localhost:6901

volumes:
  vo-data:
  # browser-data:  # Uncomment if using agent-browser
